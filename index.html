<!DOCTYPE html>
<html>
<head>
<style>
  body { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    background-color: #000000; /* Pure black background so the white text pops */
    color: #ffffff; /* Pure white text */
    /* Modern, sleek font stack identical to modern social media apps */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    margin: 0;
  }
  #counter { 
    font-size: 15vw; 
    font-weight: normal; /* Standard weight, no longer bold */
  }
</style>
</head>
<body>
  <div id="counter">1</div>

  <script>
    function animateValue(id, start, end, duration) {
        let obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }
    
    // Animates from 1 to 1095 over 5000 milliseconds (5 seconds)
    animateValue("counter", 1, 1095, 20000);
  </script>
</body>
</html>
