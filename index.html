<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muted Gold Digital Timer</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/digital-7-mono');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #050400; /* Very dark, warm black background */
            margin: 0;
            font-family: 'Digital-7 Mono', monospace;
        }

        .timer-container {
            position: relative;
            background-color: #0a0800; /* Deep brownish-black */
            padding: 40px 60px;
            border-radius: 10px;
            border: 2px solid #261e00; /* Dark brassy border */
            box-shadow: inset 0 0 40px #000000, 0 0 20px rgba(212, 175, 55, 0.08); /* Faint gold ambient glow */
        }

        /* The glowing muted gold text */
        .timer-display {
            display: flex;
            gap: 40px;
            font-size: 180px;
            line-height: 1;
            color: #d4af37; /* Muted Gold base */
            text-shadow: 
                0 0 10px rgba(212, 175, 55, 0.7),
                0 0 20px rgba(180, 140, 40, 0.5),
                0 0 40px rgba(120, 90, 20, 0.3);
            position: relative;
            z-index: 1;
        }

        /* Faint background '8's to simulate unlit segments */
        .timer-background {
            display: flex;
            gap: 40px;
            font-size: 180px;
            line-height: 1;
            color: #332800; /* Dark, unlit murky gold */
            position: absolute;
            top: 40px;
            left: 60px;
            z-index: 0;
            pointer-events: none;
        }

        .digit-group {
            display: flex;
            letter-spacing: 8px; /* Adds the slight gap between digits inside a pair */
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="timer-background">
            <div class="digit-group">88</div>
            <div class="digit-group">88</div>
            <div class="digit-group">88</div>
        </div>

        <div class="timer-display" id="timer">
            <div class="digit-group" id="min">05</div>
            <div class="digit-group" id="sec">30</div>
            <div class="digit-group" id="ms">00</div>
        </div>
    </div>

    <script>
        // Set duration for 5 minutes and 30 seconds
        const durationInMilliseconds = (5 * 60 + 30) * 1000; 
        const endTime = Date.now() + durationInMilliseconds;

        const minEl = document.getElementById('min');
        const secEl = document.getElementById('sec');
        const msEl = document.getElementById('ms');

        function updateTimer() {
            const now = Date.now();
            const remaining = endTime - now;

            // Stop the timer at 00:00:00
            if (remaining <= 0) {
                minEl.textContent = "00";
                secEl.textContent = "00";
                msEl.textContent = "00";
                return; 
            }

            // Calculate minutes, seconds, and centiseconds (hundredths of a second)
            const minutes = Math.floor((remaining / (1000 * 60)) % 60);
            const seconds = Math.floor((remaining / 1000) % 60);
            const centiseconds = Math.floor((remaining % 1000) / 10);

            // Update DOM with leading zeros for single digits
            minEl.textContent = minutes.toString().padStart(2, '0');
            secEl.textContent = seconds.toString().padStart(2, '0');
            msEl.textContent = centiseconds.toString().padStart(2, '0');

            // requestAnimationFrame runs the update loop smoothly aligned with screen refreshes
            requestAnimationFrame(updateTimer);
        }

        // Start the timer loop
        requestAnimationFrame(updateTimer);
    </script>

</body>
</html>
