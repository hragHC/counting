<!DOCTYPE html>
<html>
<head>
<style>
  body { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    background-color: #000000; 
    color: #ffffff; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    margin: 0;
  }
  #counter { 
    font-size: 10vw; /* Slightly smaller so "DAY 1095" fits on one line */
    font-weight: normal; 
  }
</style>
</head>
<body>
  <div id="counter">DAY 1</div>

  <script>
    function animateValue(id, start, end, duration) {
        let obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            
            // This is where "DAY " gets glued to the front of the number
            obj.innerHTML = "DAY " + Math.floor(progress * (end - start) + start);
            
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }
    
    // Animates from 1 to 1095 over 5000 milliseconds (5 seconds)
    animateValue("counter", 1, 1095, 5000);
  </script>
</body>
</html>
